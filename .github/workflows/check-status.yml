name: RezzSecurity Auto-Check

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Ping Services
        id: ping
        run: |
          # Check Katabump
          K_CODE=$(curl -o /dev/null -s -w "%{http_code}" https://status.katabump.eu || echo "500")
          if [ "$K_CODE" = "200" ]; then echo "k=online" >> $GITHUB_OUTPUT; else echo "k=outage" >> $GITHUB_OUTPUT; fi
          
          # Check Mephia
          M_CODE=$(curl -o /dev/null -s -w "%{http_code}" https://status.mephia.fr || echo "500")
          if [ "$M_CODE" = "200" ]; then echo "m=online" >> $GITHUB_OUTPUT; else echo "m=outage" >> $GITHUB_OUTPUT; fi
          
          # Check Netlify API
          N_STATUS=$(curl -s https://www.netlifystatus.com/api/v2/status.json | jq -r '.status.indicator')
          if [ "$N_STATUS" = "none" ]; then echo "n=online" >> $GITHUB_OUTPUT; else echo "n=outage" >> $GITHUB_OUTPUT; fi

      - name: Update File
        run: |
          K=${{ steps.ping.outputs.k }}
          M=${{ steps.ping.outputs.m }}
          N=${{ steps.ping.outputs.n }}
          
          # On remplace les valeurs dans le JS du fichier index.html
          sed -i "s/katabump: '[a-z]*'/katabump: '$K'/g" index.html
          sed -i "s/mephia: '[a-z]*'/mephia: '$M'/g" index.html
          sed -i "s/netlify: '[a-z]*'/netlify: '$N'/g" index.html

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "Infrastructure Status Update [Automated]"
